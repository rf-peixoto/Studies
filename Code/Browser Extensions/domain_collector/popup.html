<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 220px;
        font-family: system-ui, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        padding: 20px 16px;
      }

      h1 {
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 16px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .label {
        font-size: 15px;
        font-weight: 600;
      }

      /* Toggle switch */
      .switch { position: relative; width: 44px; height: 24px; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; inset: 0;
        background: #444;
        border-radius: 24px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 18px; height: 18px;
        left: 3px; top: 3px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      input:checked + .slider { background: #00c48c; }
      input:checked + .slider::before { transform: translateX(20px); }

      .status {
        margin-top: 14px;
        font-size: 12px;
        color: #666;
        text-align: center;
      }
      .status.on { color: #00c48c; }
    </style>
  </head>
  <body>
    <h1>Domain Feed</h1>
    <div class="toggle-row">
      <span class="label" id="label">Tracking</span>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>
    <p class="status" id="status">off</p>
    <script src="popup.js"></script>
  </body>
</html>
